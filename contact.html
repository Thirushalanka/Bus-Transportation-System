<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - BusGo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<script>
window.addEventListener("load", () => {
    document.body.classList.add("fade-in");
});

document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function(e) {
        const href = this.getAttribute("href");

        if (href && !href.startsWith("#") && !href.startsWith("javascript")) {
            e.preventDefault();
            document.body.classList.remove("fade-in");
            document.body.classList.add("fade-out");

            setTimeout(() => {
                window.location.href = href;
            }, 300);
        }
    });
});
</script>

<script>
function revealOnScroll() {
    const reveals = document.querySelectorAll(".reveal");

    reveals.forEach(el => {
        const windowHeight = window.innerHeight;
        const elementTop = el.getBoundingClientRect().top;
        const visiblePoint = 100;

        if (elementTop < windowHeight - visiblePoint) {
            el.classList.add("active");
        }
    });
}

window.addEventListener("scroll", revealOnScroll);
</script>


<body>

    <nav class="navbar">
    <div class="logo">
        <i class="fa-solid fa-bus"></i> BusGo
    </div>

    <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="search.html">Routes</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="auth.html" class="btn-login">Login</a></li>
    </ul>

    <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fa-solid fa-bars"></i>
    </div>
</nav>

<section class="contact-hero">
    <h1>Contact Us</h1>
    <p>We're here to help you 24/7</p>
</section>

<section class="contact-section">

    <div class="contact-container">

        <!-- Contact Info -->
        <div class="contact-info">

            <h2>Get In Touch</h2>

            <p><i class="fa-solid fa-location-dot"></i> 123 Main Street, Colombo, Sri Lanka</p>
            <p><i class="fa-solid fa-phone"></i> +94 77 123 4567</p>
            <p><i class="fa-solid fa-envelope"></i> support@busgo.lk</p>

            <div class="social-icons">
                <i class="fa-brands fa-facebook"></i>
                <i class="fa-brands fa-instagram"></i>
                <i class="fa-brands fa-twitter"></i>
            </div>

        </div>

        <!-- Contact Form -->
        <form class="contact-form">

            <h2>Send a Message</h2>

            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <input type="text" placeholder="Subject" required>
            <textarea rows="5" placeholder="Your Message" required></textarea>

            <button type="submit">Send Message</button>

        </form>

    </div>

</section>

<!-- Google Map -->
<section class="map-section">
    <iframe 
        src="https://maps.google.com/maps?q=Colombo&t=&z=13&ie=UTF8&iwloc=&output=embed"
        frameborder="0"
        allowfullscreen="">
    </iframe>
</section>

<footer>
    <p>© 2026 BusGo | Safe & Smart Travel</p>
</footer>

<script>
function toggleMenu(){
    document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>
