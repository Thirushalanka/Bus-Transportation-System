<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Seats - BusGo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<script>
window.addEventListener("load", () => {
    document.body.classList.add("fade-in");
});

document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function(e) {
        const href = this.getAttribute("href");

        if (href && !href.startsWith("#") && !href.startsWith("javascript")) {
            e.preventDefault();
            document.body.classList.remove("fade-in");
            document.body.classList.add("fade-out");

            setTimeout(() => {
                window.location.href = href;
            }, 300);
        }
    });
});
</script>

<script>
function revealOnScroll() {
    const reveals = document.querySelectorAll(".reveal");

    reveals.forEach(el => {
        const windowHeight = window.innerHeight;
        const elementTop = el.getBoundingClientRect().top;
        const visiblePoint = 100;

        if (elementTop < windowHeight - visiblePoint) {
            el.classList.add("active");
        }
    });
}

window.addEventListener("scroll", revealOnScroll);
</script>

<body>
    <nav class="navbar">
    <div class="logo">
        <i class="fa-solid fa-bus"></i> BusGo
    </div>

    <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="search.html">Routes</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="auth.html" class="btn-login">Login</a></li>
    </ul>

    <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fa-solid fa-bars"></i>
    </div>
</nav>

<section class="seat-page">

    <h2>Select Your Seats</h2>

    <!-- Legend -->
    <div class="legend">
        <div><span class="seat available"></span> Available</div>
        <div><span class="seat selected"></span> Selected</div>
        <div><span class="seat booked"></span> Booked</div>
    </div>

    <div class="seat-container">

        <!-- Driver -->
        <div class="driver">
            <i class="fa-solid fa-steering-wheel"></i>
        </div>

        <!-- Seats Grid -->
        <div class="seats-grid" id="seatGrid">
            <!-- Seats generated by JS -->
        </div>
    </div>

    <!-- Summary -->
    <div class="seat-summary">
        <p>Selected Seats: <span id="count">0</span></p>
        <p>Total Price: LKR <span id="total">0</span></p>
        <button id="continueBtn">Continue</button>
    </div>

</section>

<script>
const seatGrid = document.getElementById("seatGrid");
const count = document.getElementById("count");
const total = document.getElementById("total");
const continueBtn = document.getElementById("continueBtn");

const seatPrice = 1500;
let selectedSeats = [];

for(let i = 1; i <= 32; i++){
    const seat = document.createElement("div");
    seat.classList.add("seat","available");
    seat.innerText = i;

    if(Math.random() < 0.2){
        seat.classList.remove("available");
        seat.classList.add("booked");
    }

    seat.addEventListener("click", () => {
        if(seat.classList.contains("booked")) return;

        seat.classList.toggle("selected");

        if(seat.classList.contains("selected")){
            selectedSeats.push(i);
        } else {
            selectedSeats = selectedSeats.filter(num => num !== i);
        }

        count.innerText = selectedSeats.length;
        total.innerText = selectedSeats.length * seatPrice;
    });

    seatGrid.appendChild(seat);
}

continueBtn.addEventListener("click", () => {
    if(selectedSeats.length === 0){
        alert("Please select at least one seat.");
        return;
    }

    localStorage.setItem("selectedSeats", JSON.stringify(selectedSeats));
    localStorage.setItem("totalAmount", selectedSeats.length * seatPrice);

    window.location.href = "checkout.html";
});

function toggleMenu(){
    document.getElementById("navLinks").classList.toggle("active");
}

</script>

</body>
</html>
